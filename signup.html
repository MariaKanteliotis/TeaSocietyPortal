    <header class="hero-section small-hero"> 

        <div class="container text-center"> 

            <h1 class="fw-bold">Join the Tea Society</h1> 

            <p class="lead mt-3"> 

                Register to become a member and join us for tea tastings, social events, and community activities. 

            </p> 

        </div> 

    </header> 

  

    <div class="container my-5"> 

        <div class="card p-4 custom-card"> 

            <h2 class="text-center mb-4">Member Registration Form</h2> 

  

            <form id="signupForm" class="row g-3" novalidate> 

  

                <div class="col-md-6"> 

                    <label for="firstName" class="form-label">First Name <strong class="text-danger">*</strong></label> 

                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Jane" autocomplete="off" required> 

                    <div class="text-danger" id="firstNameError"></div> 

                </div> 

  

                <div class="col-md-6"> 

                    <label for="lastName" class="form-label">Last Name <strong class="text-danger">*</strong></label> 

                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Doe" autocomplete="off" required> 

                    <div class="text-danger" id="lastNameError"></div> 

                </div> 

  

                <div class="col-md-6"> 

                    <label for="email" class="form-label">Email Address <strong class="text-danger">*</strong></label> 

                    <input type="email" class="form-control" id="email" name="email" placeholder="jane@example.com" autocomplete="off" required> 

                    <div class="text-danger" id="emailError"></div> 

                </div> 

  

                <div class="col-md-6"> 

                    <label for="phone" class="form-label">Phone Number</label> 

                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="123-456-7890" autocomplete="off"> 

                    <div class="text-danger" id="phoneError"></div> 

                </div> 

  

                <div class="col-md-6"> 

                    <label for="street" class="form-label">Affiliation / Major <strong class="text-danger">*</strong></label> 

                    <input type="text" class="form-control" id="street" name="street" placeholder="Biology Club / Business Major" autocomplete="off" required> 

                    <div class="text-danger" id="streetError"></div> 

                </div> 

  

                <div class="col-md-3"> 

                    <label for="city" class="form-label">Year <strong class="text-danger">*</strong></label> 

                    <input type="text" class="form-control" id="city" name="city" placeholder="Junior" autocomplete="off" required> 

                    <div class="text-danger" id="cityError"></div> 

                </div> 

  

                <div class="col-md-3"> 

                    <label for="state" class="form-label">Tea Preference <strong class="text-danger">*</strong></label> 

                    <select class="form-select" id="state" name="state" required> 

                        <option value="">Choose...</option> 

                        <option value="Green Tea">Green Tea</option> 

                        <option value="Black Tea">Black Tea</option> 

                        <option value="Herbal Tea">Herbal Tea</option> 

                        <option value="Milk Tea">Milk Tea</option> 

                    </select> 

                    <div class="text-danger" id="stateError"></div> 

                </div> 

  

                <div class="col-md-4"> 

                    <label for="zip" class="form-label">Student ID / Zip <strong class="text-danger">*</strong></label> 

                    <input type="text" class="form-control" id="zip" name="zip" placeholder="Optional project-specific value" autocomplete="off" required> 

                    <div class="text-danger" id="zipError"></div> 

                </div> 

  

                <div class="col-12 text-center mt-3"> 

                    <button class="btn btn-success me-2" type="submit">Register</button> 

                    <button class="btn btn-secondary" type="reset">Clear Form</button> 

                    <button class="btn btn-primary" type="button" onclick="downloadUsersJSON()">Download JSON</button> 

</div> 

                </div> 

            </form> 

        </div> 

    </div> 

  

    <div class="container my-5 text-center"> 

        <h3 class="mb-3">Registered Members</h3> 

        <div class="container my-4" id="userCard"></div> 

    </div>
