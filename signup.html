<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Tea Society Member Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">Tea Society</a>

<div class="collapse navbar-collapse">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="#">Members</a>
</li>

</ul>
</div>

</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">Tea Society Member Registration</h2>

<form id="memberForm">

<div class="mb-3">
<label class="form-label">Member Name *</label>
<input type="text" class="form-control" id="name">
</div>

<div class="mb-3">
<label class="form-label">Email Address *</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-3">
<label class="form-label">Year / Grade Level *</label>
<input type="text" class="form-control" id="year">
</div>

<div class="mb-3">
<label class="form-label">School / Organization *</label>
<input type="text" class="form-control" id="organization">
</div>

<div class="mb-3">
<label class="form-label">Phone Number (Optional)</label>
<input type="text" class="form-control" id="phone">
</div>

<button type="submit" class="btn btn-primary">
Register Member
</button>

<p id="message" class="mt-3"></p>

</form>

<hr class="my-5">

<h3>Tea Society Member Directory</h3>

<table class="table table-striped">

<thead>
<tr>

<th>Name</th>
<th>Email</th>
<th>Year</th>
<th>Organization</th>
<th>Phone</th>
<th>Actions</th>

</tr>
</thead>

<tbody id="memberTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
