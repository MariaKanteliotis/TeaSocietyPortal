<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Society Order History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .pending { background: #fff3cd; color: #856404; }
        .approved { background: #d1e7dd; color: #0f5132; }
        .declined { background: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Tea Society</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="signup.html">Member Registration</a></li>
                <li class="nav-item"><a class="nav-link" href="content-management.html">Events</a></li>
                <li class="nav-item"><a class="nav-link" href="shopping-cart.html">Storefront</a></li>
                <li class="nav-item"><a class="nav-link" href="finalization.html"> Event Finalization</a></li>
                <li class="nav-item"><a class="nav-link active" href="order-history.html">Order History</a></li>
            </ul>
        </div>
    </div>
</nav>

<header class="hero-section small-hero text-center">
    <div class="container">
        <h1>Order History</h1>
        <p>View your event registrations and status</p>
    </div>
</header>

<main class="container my-5">

    <input type="text" id="search" class="form-control mb-4" placeholder="Search orders...">

    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="orderTable">
                <tr>
                    <td colspan="5" class="text-center">No data yet</td>
                </tr>
            </tbody>
        </table>
    </div>

</main>

<footer class="text-center py-3">
    <p>&copy; 2026 Tea Society</p>
</footer>

</body>
</html>
