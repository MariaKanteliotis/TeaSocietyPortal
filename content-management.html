<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tea Society Events</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body style="background-color:#C1E1C1;">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Tea Society</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="events.html">Events</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="content-management.html">Manage</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
  <h2 class="text-center">Tea Society Event Management</h2>

  <form id="eventForm">

    <div class="mb-3">
      <label class="form-label">Event Name *</label>
      <input type="text" id="title" class="form-control" placeholder="Enter event name">
    </div>

    <div class="mb-3">
      <label class="form-label">Category *</label>
      <select id="category" class="form-control">
        <option value="">Select</option>
        <option>Workshop</option>
        <option>Social Event</option>
        <option>Meeting</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Event Length *</label>
      <input type="text" id="duration" class="form-control" placeholder="e.g. 2 hours">
    </div>

    <div class="mb-3">
      <label class="form-label">Access / Fee *</label>
      <input type="text" id="price" class="form-control" placeholder="Free / Members Only">
    </div>

    <div class="mb-3">
      <label class="form-label">Location / Speaker</label>
      <input type="text" id="info" class="form-control">
    </div>

    <button class="btn btn-primary">Add Event</button>

    <p id="message" class="mt-2"></p>

  </form>

  <hr>

  <input type="text" id="search" class="form-control mb-3" placeholder="Search events...">

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Length</th>
        <th>Fee</th>
        <th>Info</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="eventTable"></tbody>
  </table>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/events.js"></script>

</body>
</html>
