<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tea Society Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center">Tea Society Event Management</h2>

  <form id="eventForm">
    <div class="mb-3">
      <label class="form-label">Event Name</label>
      <input type="text" class="form-control" placeholder="Enter event name">
    </div>

    <div class="mb-3">
      <label class="form-label">Category</label>
      <select class="form-control">
        <option>Workshop</option>
        <option>Social Event</option>
        <option>Meeting</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Event Length</label>
      <input type="text" class="form-control" placeholder="e.g. 2 hours">
    </div>

    <div class="mb-3">
      <label class="form-label">Access / Fee</label>
      <input type="text" class="form-control" placeholder="Free / Members Only">
    </div>

    <div class="mb-3">
      <label class="form-label">Location / Speaker</label>
      <input type="text" class="form-control">
    </div>

    <button class="btn btn-primary">Add Event</button>
 <form id="eventForm">
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="events.js"></script>
</body>
</html>
