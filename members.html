<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tea Society Member Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Tea Society</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="members.html">Member Registration</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card p-4">
            <h2 class="text-center mb-4">Tea Society Member Registration</h2>

            <form id="memberForm" novalidate>
                <input type="hidden" id="memberIndex">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="memberName" class="form-label">Member Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="memberName" name="memberName">
                        <div class="text-danger" id="memberNameError"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" name="email">
                        <div class="text-danger" id="emailError"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="year" class="form-label">Year in School <span class="text-danger">*</span></label>
                        <select class="form-select" id="year" name="year">
                            <option value="">Choose...</option>
                            <option value="Freshman">Freshman</option>
                            <option value="Sophomore">Sophomore</option>
                            <option value="Junior">Junior</option>
                            <option value="Senior">Senior</option>
                            <option value="Graduate">Graduate</option>
                        </select>
                        <div class="text-danger" id="yearError"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="affiliation" class="form-label">Affiliation / Major <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="affiliation" name="affiliation">
                        <div class="text-danger" id="affiliationError"></div>
                    </div>

                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone">
                        <div class="text-danger" id="phoneError"></div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Save Member</button>
                        <button type="reset" class="btn btn-secondary" id="clearBtn">Clear Form</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="container my-5">
        <h3 class="mb-3">Registered Members</h3>

        <div class="table-responsive">
            <table class="table table-bordered table-striped" id="memberTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Year</th>
                        <th>Affiliation</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="memberTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="members.js"></script>
</body>
</html>
